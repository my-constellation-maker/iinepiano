<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | いいねピアノ</title>
<style>
  :root {
    --beige: #f5f0e8;
    --ivory: #faf8f2;
    --warm: #ede7d9;
    --accent: #8b6f47;
    --accent-light: #c4a97d;
    --text: #3a3028;
    --text-muted: #7a6a58;
    --white: #ffffff;
    --border: #d8cfc0;
    --line-green: #06c755;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "ヒラギノ明朝 ProN W3", "Hiragino Mincho ProN", "游明朝", YuMincho, serif;
    background-color: var(--ivory);
    color: var(--text);
    line-height: 1.8;
  }

  header {
    background-color: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  nav {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .nav-logo {
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.05em;
  }

  .nav-links {
    display: flex;
    list-style: none;
    gap: 2.5rem;
  }

  .nav-links a {
    text-decoration: none;
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--accent);
  }

  .hero {
    background-color: var(--beige);
    text-align: center;
    padding: 5rem 2rem 4rem;
    border-bottom: 1px solid var(--border);
  }

  .hero h1 {
    font-size: 2rem;
    font-weight: normal;
    color: var(--text);
    letter-spacing: 0.1em;
  }

  .section {
    max-width: 600px;
    margin: 0 auto;
    padding: 5rem 2rem;
  }

  .lead {
    font-size: 0.95rem;
    color: var(--text-muted);
    text-align: center;
    line-height: 2;
    margin-bottom: 3rem;
  }

  .contact-card {
    background-color: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2.5rem 2rem;
    margin-bottom: 1.2rem;
  }

  .contact-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--accent-light);
    margin-bottom: 0.6rem;
  }

  .contact-title {
    font-size: 1rem;
    font-weight: normal;
    color: var(--text);
    letter-spacing: 0.06em;
    margin-bottom: 0.8rem;
  }

  .contact-desc {
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.9;
    margin-bottom: 1.5rem;
  }

  .btn-line {
    display: block;
    width: 100%;
    background-color: var(--line-green);
    color: var(--white);
    text-decoration: none;
    text-align: center;
    padding: 0.9rem 1rem;
    border-radius: 2px;
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    transition: opacity 0.2s;
  }

  .btn-line:hover { opacity: 0.85; }

  .qr-area {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .qr-area p {
    font-size: 0.82rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 0.8rem;
  }

  .qr-area img {
    width: 120px;
    height: 120px;
  }

  .btn-mail {
    display: block;
    width: 100%;
    background-color: var(--warm);
    color: var(--accent);
    text-decoration: none;
    text-align: center;
    padding: 0.9rem 1rem;
    border-radius: 2px;
    border: 1px solid var(--accent-light);
    font-family: inherit;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    transition: background-color 0.2s;
  }

  .btn-mail:hover {
    background-color: var(--beige);
  }

  .reply-note {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 1.5rem;
    line-height: 1.9;
  }

  footer {
    background-color: var(--beige);
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 2rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .hero h1 { font-size: 1.5rem; }
    .contact-card { padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="nav-logo">いいねピアノ</a>
    <ul class="nav-links">
      <li><a href="index.html">トップ</a></li>
      <li><a href="lesson.html">レッスンについて</a></li>
      <li><a href="profile.html">講師プロフィール</a></li>
      <li><a href="contact.html" class="active">お問い合わせ</a></li>
    </ul>
  </nav>
</header>

<div class="hero">
  <h1>お問い合わせ</h1>
</div>

<section class="section">

  <p class="lead">ご不明な点やご質問など、<br>お気軽にご連絡ください。</p>

  <!-- LINEカード -->
  <div class="contact-card">
    <p class="contact-label">LINE</p>
    <p class="contact-title">LINEでお問い合わせ</p>
    <p class="contact-desc">お気軽にメッセージをどうぞ。</p>
    <a href="https://lin.ee/zuEwVb7" class="btn-line">友だち追加してメッセージを送る</a>
    <div class="qr-area">
      <p>こちらのQRコードからもご利用いただけます。</p>
      <img src="https://qr-official.line.me/gs/M_637ufkwx_BW.png?oat_content=qr" alt="いいねピアノ LINE友だち追加QRコード">
    </div>
  </div>

  <!-- メールカード -->
  <div class="contact-card">
    <p class="contact-label">メール</p>
    <p class="contact-title">メールでお問い合わせ</p>
    <p class="contact-desc">お気軽にメールでもお問い合わせください。</p>
    <a href="mailto:info@iinepiano.com" class="btn-mail">メールでお問い合わせはこちら</a>
  </div>

  <p class="reply-note">いずれも、できるだけ早くお返事いたします。</p>

</section>

<footer>
  <p>© 2026 いいねピアノ</p>
</footer>

</body>
</html>
